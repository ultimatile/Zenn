version: 1

# 用字・表記ゆれの統一辞書（house policy）。
# textlint が検出し、`--fix` で自動修正できる。
# 方向が割れる語は GLOSSARY と同じく propose-and-confirm で確定してから追加する。
# 用字の原則: 形式名詞（こと・もの・とき・ところ・ため 等の抽象用法）はかな、
#             実質名詞（仕組み・場合 等）は漢字。常用漢字表外の字はかな。
#
# 機械化可能性は語ごとに違う。安全に substring 置換できるものだけ載せる。
# 文脈依存で誤爆する語（例: いま）は共起限定でしか載せられない（下記参照）。

rules:
  # 実質名詞は漢字に統一する（標準デフォルト。かな寄せにするなら expected/pattern を入れ替える）
  - expected: 仕組み
    pattern: しくみ

  # 表外漢字「躓」はかなに統一する。常用漢字表外なので技術文書ではかな書きが標準。
  # 「躓」は常に「つまず」なので、送り仮名（き・く・いて 等）は後続のかながそのまま残り安全。
  - expected: つまず
    pattern: 躓

  # 「通り」の形式名詞用法（〜のとおり＝「に従って」）はかな「どおり」に統一する。
  # 実質名詞（大通り・人通り・通り道）や数詞（二通り）を壊さないよう、
  # 形式名詞になる語幹を列挙して限定する（出てきたら追記する）。
  - expected: $1どおり
    pattern: /(期待|予定|文字|計画|想定|従来|予想|時間|注文|約束|指示|規定|命令|額面|思い|これまで|いつも)通り/

  # 「いま（副詞・今）」の安全な共起だけ漢字に寄せる。
  # bare「いま→今」は不可: 「ています/いません/いました」の内部に「いま」が出て破壊し、
  # 「いまだ＝未だ」は今ではない別語。したがって共起限定でのみ機械化する。
  - expected: 今も
    pattern: いまも
  - expected: 今や
    pattern: いまや
  - expected: 今さら
    pattern: いまさら
  - expected: 今まで
    pattern: いままで
  - expected: 今なお
    pattern: いまなお
  - expected: 今のところ
    pattern: いまのところ

  # 「函数」は表外字「函」を含むが house style として意図的に用いる（数学の伝統表記）。
  # 躓→つまず と逆向きの判断: 無拘りの表外字はかな、著者が意味・伝統で選ぶ語は漢字を採る。
  # 常用形「関数」を house 形「函数」へ正規化する。
  # lookbehind で除外するのは実在する (〜関+数) 複合語だけ: 機関数（金融機関数 等）・通関数量。
  # 相関関数・波動関数・分配関数・主関数・租税関数 等は正しく函数化する（過剰除外しない）。
  - expected: 函数
    pattern: /(?<!機|通)関数/
